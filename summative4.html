<html>
<head>
<title>Choice Sederhana</title>
<link rel="stylesheet" href="summative4.css">
</head>
<body>

<div class="container">
<h2>Form Pelanggan</h2>

<label>Nama:</label>
<input type="text" id="nama" placeholder="Masukkan nama anda">

<label>Kelas:</label>
<input type="text" id="kelas" placeholder="Masukkan kelas anda">

<label>Umur:</label>
<label><input type="radio" name="umur" value="10-12"> 10-12 tahun</label>
<label><input type="radio" name="umur" value="13-15"> 13-15 tahun</label>
<label><input type="radio" name="umur" value="16-18"> 16-18 tahun</label>

<label>Jenis Kelamin:</label>
<label><input type="radio" name="gender" value="Laki-laki"> Laki-laki</label>
<label><input type="radio" name="gender" value="Perempuan"> Perempuan</label>

<label>Tingkatan:</label>
<label><input type="radio" name="tingkatan" value="SD"> SD</label>
<label><input type="radio" name="tingkatan" value="SMP"> SMP</label>
<label><input type="radio" name="tingkatan" value="SMA"> SMA</label>

<label>
<input type="checkbox" id="setuju"> Saya setuju
</label>

<button id="tampilkanBTN">OK</button>

<div id="hasil" class="result"></div>

</div>

<script src="summative4.js"></script>
</body>
</html>
